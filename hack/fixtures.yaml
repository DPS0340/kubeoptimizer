# Deliberate waste for the e2e smoke test.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: e2e-unbound-pv
spec:
  capacity: { storage: 10Gi }
  accessModes: [ReadWriteOnce]
  hostPath: { path: /tmp/e2e-unbound }
---
apiVersion: v1
kind: Service
metadata:
  name: e2e-idle-lb
  namespace: default
spec:
  type: LoadBalancer
  selector: { app: does-not-exist }
  ports: [{ port: 80 }]
---
apiVersion: v1
kind: Pod
metadata:
  name: e2e-no-requests
  namespace: default
spec:
  containers:
    - name: pause
      image: registry.k8s.io/pause:3.9
